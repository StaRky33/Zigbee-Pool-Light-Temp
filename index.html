<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pool Controller — STARKYDIY</title>
  <style>
    :root {
      --blue:        #2563eb;
      --green:       #16a34a;
      --bg:          #f8fafc;
      --card-bg:     #ffffff;
      --card-border: #e2e8f0;
      --item-bg:     #f1f5f9;
      --text:        #1e293b;
      --muted:       #64748b;
      --shadow:      rgba(0,0,0,0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --blue:        #60a5fa;
        --green:       #4ade80;
        --bg:          #0f172a;
        --card-bg:     #1e293b;
        --card-border: #334155;
        --item-bg:     #0f172a;
        --text:        #f1f5f9;
        --muted:       #94a3b8;
        --shadow:      rgba(0,0,0,0.3);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 24px var(--shadow);
    }

    .badge {
      display: inline-block;
      background: var(--item-bg);
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.25rem 0.75rem;
      border-radius: 99px;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .version {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 1.75rem;
    }

    .version span {
      font-weight: 600;
      color: var(--blue);
    }

    .loaded {
      opacity: 0.5;
    }

    .loaded {
      opacity: 1;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .info-item {
      background: var(--item-bg);
      border-radius: 10px;
      padding: 0.75rem 1rem;
    }

    .info-item .label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .info-item .value {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--card-border);
      margin: 1.75rem 0;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    esp-web-install-button {
      --esp-tools-button-color: var(--blue);
      --esp-tools-button-text-color: white;
    }

    esp-web-install-button::part(button) {
      width: 100%;
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      background: var(--blue);
      color: white;
      transition: opacity 0.15s;
    }


    .flash-note {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      margin-top: 0.75rem;
    }

    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 10px;
      border: 2px solid var(--green);
      background: transparent;
      color: var(--green);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .download-btn:hover {
      background: var(--green);
      color: #fff;
    }

    .download-btn:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .download-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .download-note {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      margin-top: 0.5rem;
    }

    .download-note code {
      background: var(--item-bg);
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      font-size: 0.72rem;
    }

    .error-msg {
      font-size: 0.78rem;
      color: #ef4444;
      text-align: center;
      margin-top: 0.5rem;
      display: none;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }

    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">STARKYDIY</div>
    <h1 id="title">Pool Controller</h1>

    <p class="version">Version <span id="version">—</span></p>

    <div class="info-grid">
      <div class="info-item">
        <div class="label">Chip</div>
        <div class="value" id="chip">—</div>
      </div>
      <div class="info-item">
        <div class="label">Protocol</div>
        <div class="value" id="protocol">—</div>
      </div>
      <div class="info-item">
        <div class="label">EP 10</div>
        <div class="value" id="ep10">—</div>
      </div>
      <div class="info-item">
        <div class="label">EP 11</div>
        <div class="value" id="ep11">—</div>
      </div>
    </div>

    <hr class="divider" />

    <div class="section-title">① Flash firmware</div>
    <esp-web-install-button id="install-btn"></esp-web-install-button>
    <p class="flash-note">Flashes via USB (Chrome/Edge)</p>

    <hr class="divider" />

    <div class="section-title">② (Optional) External converter</div>
    <button class="download-btn" id="dl-btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
      </svg>
      <span id="dl-label">Download converter</span>
    </button>
    <p class="download-note" id="dl-note">For Zigbee2MQTT — place in <code>external_converters/</code></p>
    <p class="error-msg" id="dl-error">Download failed — try again later</p>

    <footer>
      <a href="https://github.com/StaRky33/Zigbee-Pool-Light-Temp">GitHub</a>&nbsp;·&nbsp;
      <a href="https://starky33.github.io/Zigbee-Pool-Light-Temp/">Web Builder</a>
    </footer>
  </div>

  <script type="module" src="https://unpkg.com/esp-web-tools@9.1.0/web/install-button.js?module"></script>
  <script>
    const url = 'https://raw.githubusercontent.com/StaRky33/Zigbee-Pool-Light-Temp/refs/heads/gh-pages/firmware/pool_light_temp_esp32c6.json';
    const btn   = document.getElementById('dl-btn');
    const label = document.getElementById('dl-label');
    const error = document.getElementById('dl-error');

    // Load manifest.json and update UI dynamically
    async function loadManifest() {
      try {
        const response = await fetch('manifest.json');
        
        if (!response.ok) {
          throw new Error('Manifest not found');
        }
        
        const manifest = await response.json();
        
        // Update title with version
        const titleEl = document.getElementById('title');
        if (titleEl && manifest.version) {
          titleEl.textContent = `Pool Controller v${manifest.version}`;
        }
        
        // Update version in subtitle
        const versionEl = document.getElementById('version');
        if (versionEl && manifest.version) {
          versionEl.textContent = manifest.version;
        }
        
        // Update chip family
        const chipEl = document.getElementById('chip');
        if (chipEl && manifest.builds && manifest.builds.length > 0) {
          const chip = manifest.builds[0].chipFamily || 'ESP32-C6';
          chipEl.textContent = chip;
          chipEl.classList.add('loaded');
        }
        
        // Update protocol
        const protocolEl = document.getElementById('protocol');
        if (protocolEl) {
          protocolEl.textContent = 'Zigbee';
          protocolEl.classList.add('loaded');
        }

        // Update EP 10
        const ep10El = document.getElementById('ep10');
        if (ep10El) {
          ep10El.textContent = 'Relay';
          ep10El.classList.add('loaded');
        }

        // Update EP 11
        const ep11El = document.getElementById('ep11');
        if (ep11El) {
          ep11El.textContent = 'Temp';
          ep11El.classList.add('loaded');
        }
        
      } catch (err) {
        console.warn('Could not load manifest:', err.message);
        // Fallback values are already in place
      }
    }
    
    // Load manifest on page load
    loadManifest();
    
    async function downloadConverter() {
      btn.disabled  = true;
      label.textContent = 'Downloading…';
      error.style.display = 'none';

      try {
        const res  = await fetch(url);

        if (!res.ok) {
          throw new Error('Network error');
        }

        const blob = await res.blob();
        const a    = document.createElement('a');
        a.href     = URL.createObjectURL(blob);
        a.download = 'poolLightTemp.mjs';
        a.click();
        URL.revokeObjectURL(a.href);

        label.textContent = '✓ Downloaded!';
      } catch (err) {
        error.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
